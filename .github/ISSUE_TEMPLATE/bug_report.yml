name: Bug report
description: Report a problem with mo.nvim
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Open a Markdown file
        2. Run `:MoAdd`
        3. ...
    validations:
      required: true
  - type: input
    id: nvim-version
    attributes:
      label: Neovim version
      description: Output of `nvim --version` (first line)
      placeholder: "NVIM v0.10.0"
    validations:
      required: true
  - type: input
    id: mo-version
    attributes:
      label: mo version
      description: Output of `mo --version`
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15 / Ubuntu 24.04 / ..."
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant messages
      description: Paste any relevant output from `:messages` here.
      render: text
